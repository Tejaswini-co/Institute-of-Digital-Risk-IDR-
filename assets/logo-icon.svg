<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Right face top (Light Gray) -->
  <polygon points="50,50 85,30 85,50 50,70" fill="#f0f0f0" />
  <!-- Right face bottom (Black) -->
  <polygon points="50,70 85,50 85,70 50,90" fill="#111111" />
  <!-- Left face (Black) -->
  <polygon points="50,50 15,30 15,70 50,90" fill="#111111" />
  <!-- Top face (Orange) -->
  <polygon points="50,50 85,30 50,10 15,30" fill="#ff5a00" />
  <!-- White strokes to form the logo features -->
  <line x1="50" y1="50" x2="50" y2="90" stroke="#ffffff" stroke-width="4" />
  <polyline points="15,30 50,50 85,30" stroke="#ffffff" stroke-width="4" fill="none" stroke-linejoin="round" />
  <polyline points="32.5,40 32.5,60 50,70" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" fill="none" />
  <line x1="50" y1="70" x2="85" y2="50" stroke="#ffffff" stroke-width="4" />
  <line x1="67.5" y1="60" x2="67.5" y2="80" stroke="#ffffff" stroke-width="4" />
</svg>